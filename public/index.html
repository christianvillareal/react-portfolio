    <meta name="theme-color" content="#000000" />
    <script>
      (function (location) {
        if (location.search[1] === '/') {
          var decodedPath = location.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(
            null,
            '',
            location.pathname.slice(0, -1) + decodedPath + location.hash
          );
        }
      })(window.location);
    </script>
