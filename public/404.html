<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Christian Villareal Portfolio</title>
  <script>
    (function () {
      var pathSegmentsToKeep = 1;
      var location = window.location;

      location.replace(
        location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') +
        location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        location.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
        location.hash
      );
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/react-portfolio/">
  </noscript>
</head>
<body>
  <p>Loading portfolio...</p>
  <p>If you are not redirected, <a href="/react-portfolio/">click here</a>.</p>
</body>
</html>
